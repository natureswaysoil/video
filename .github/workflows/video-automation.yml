name: Nature's Way Soil Video Automation

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC time.
    # Five daily posting slots (~ET): 7:00 AM, 8:15 AM, 11:30 AM, 1:00 PM, 6:15 PM
    - cron: '0 11 * * *'
    - cron: '15 12 * * *'
    - cron: '30 15 * * *'
    - cron: '0 17 * * *'
    - cron: '15 22 * * *'

jobs:
  video-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      RUN_ONCE: 'true'
      ROWS_PER_RUN: '1'
      ALWAYS_GENERATE_NEW_VIDEO: 'true'
      ENABLE_PLATFORMS: 'youtube,instagram,facebook'
      TEST_VIDEO_CAMPAIGN_MODE: ${{ secrets.TEST_VIDEO_CAMPAIGN_MODE || 'false' }}
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'natureswaysoil-video' }}
      GCLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'natureswaysoil-video' }}
      GCP_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'natureswaysoil-video' }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-service-account.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Write Google credentials
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          chmod 600 "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Install dependencies
        run: npm ci

      - name: Generate daily rows at morning window (standard mode)
        if: (github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch') && env.TEST_VIDEO_CAMPAIGN_MODE != 'true'
        run: npm run generate:rows

      - name: Run test-video campaign (local/public test assets mode)
        if: env.TEST_VIDEO_CAMPAIGN_MODE == 'true'
        run: npm run run:test-campaign

      - name: Run standard video pipeline once
        if: env.TEST_VIDEO_CAMPAIGN_MODE != 'true'
        run: npm run run:once
