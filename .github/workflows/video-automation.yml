name: Nature's Way Soil Video Automation

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC time.
    - cron: '0 11 * * *'   # 7:00 AM ET during daylight time: generate rows + run pipeline
    - cron: '15 12 * * *'  # 8:15 AM ET
    - cron: '30 15 * * *'  # 11:30 AM ET
    - cron: '0 17 * * *'   # 1:00 PM ET
    - cron: '15 22 * * *'  # 6:15 PM ET
    - cron: '30 23 * * *'  # 7:30 PM ET

jobs:
  video-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      RUN_ONCE: 'true'
      ROWS_PER_RUN: '1'
      ALWAYS_GENERATE_NEW_VIDEO: 'true'
      ENABLE_PLATFORMS: 'youtube,instagram,facebook'
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GCLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GCP_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-service-account.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Write Google credentials
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          chmod 600 "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Install dependencies
        run: npm ci

      - name: Generate daily rows at morning window
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: npm run generate:rows

      - name: Run video pipeline once
        run: npm run run:once
