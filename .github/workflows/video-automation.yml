name: Nature's Way Soil Video Automation

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC time.
    # Five daily posting slots (~ET): 7:00 AM, 8:15 AM, 11:30 AM, 1:00 PM, 6:15 PM
    - cron: '0 11 * * *'
    - cron: '15 12 * * *'
    - cron: '30 15 * * *'
    - cron: '0 17 * * *'
    - cron: '15 22 * * *'

jobs:
  video-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TEST_VIDEO_CAMPAIGN_MODE: 'true'
      TEST_VIDEOS_DIR: test-campaign-videos
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'natureswaysoil-video' }}
      GCLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'natureswaysoil-video' }}
      GCP_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'natureswaysoil-video' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (ADC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'natureswaysoil-video' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled test campaign videos exist
        run: |
          test -d "$TEST_VIDEOS_DIR"
          ls -1 "$TEST_VIDEOS_DIR"/*.mp4

      - name: Run test-video campaign (rotation mode)
        run: npm run run:test-campaign
