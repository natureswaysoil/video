name: Refresh Facebook Token

on:
  workflow_dispatch:  # Manual trigger

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange for long-lived Page token
        env:
          APP_ID: "1888081348440882"
          APP_SECRET: "5871337b9b11ecbd4f251cf427ec2dac"
          SHORT_TOKEN: "EAAKPsbhQO70BQZCYWZBo3udR0oain4syEcphaivGRIOAxCVjZA3htvvAU7HIZBZA206sWYcSl6NL49faKet2Mm39mzZA9pH37r89Y3oS8Ak5AO5ZBDCzjSmwdE77kLx0sJl00UHOAfKZBpxNnenbc6aYk7fLDft55ZBtOv0mTeRH7mliXO3WSw59T5xXFN5jpEAFknueKLkakqheoRV7vmhHJXRAiN3ZAoAMPWvjZAkd5BhI1I9slZAjJ9LZAVKUk"
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: "prj_N1Lp45LaYTqtqWZ9SDUnhNHXnQPk"
          VERCEL_TEAM_ID: "team_IinPoA3ygJ6LwThhXYw3hBfI"
        run: |
          echo "Step 1: Getting long-lived user token..."
          LONG_TOKEN=$(curl -s "https://graph.facebook.com/v19.0/oauth/access_token?grant_type=fb_exchange_token&client_id=$APP_ID&client_secret=$APP_SECRET&fb_exchange_token=$SHORT_TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR: '+str(d)))")
          echo "Long token: ${LONG_TOKEN:0:20}..."

          echo "Step 2: Getting permanent Page token..."
          PERMANENT_PAGE_TOKEN=$(curl -s "https://graph.facebook.com/v19.0/me/accounts?access_token=$LONG_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          pages=d.get('data',[])
          for p in pages:
              print(f'Found page: {p.get(\"name\")} ({p.get(\"id\")})', file=__import__('sys').stderr)
              if p.get('id')=='61555816859969':
                  print(p['access_token'])
          ")

          if [ -z "$PERMANENT_PAGE_TOKEN" ]; then
            echo "❌ Failed to get permanent page token"
            exit 1
          fi

          echo "✅ Got permanent page token: ${PERMANENT_PAGE_TOKEN:0:20}..."

          echo "Step 3: Updating Vercel env var..."
          # Get existing env var ID first
          ENV_ID=$(curl -s "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys,json
          envs=json.load(sys.stdin).get('envs',[])
          for e in envs:
              if e.get('key')=='FACEBOOK_PAGE_ACCESS_TOKEN':
                  print(e['id'])
          ")

          echo "Env var ID: $ENV_ID"

          # Update the env var
          curl -s -X PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$PERMANENT_PAGE_TOKEN\"}"

          echo ""
          echo "✅ Vercel env var updated with permanent token!"
          echo "Token preview: ${PERMANENT_PAGE_TOKEN:0:30}..."
