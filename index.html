<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nature's Way Soil Dashboard</title>
  <meta http-equiv="refresh" content="0; url=docs/">
  <script>
    // Keep this tiny redirect at repo root so GitHub Pages works from either / or /docs.
    (function () {
      var target = 'docs/';
      if (!location.pathname.endsWith('/')) {
        location.replace(location.pathname + '/' + target);
        return;
      }
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to dashboard...</p>
  <p><a href="docs/">Open dashboard</a></p>
</body>
</html>
